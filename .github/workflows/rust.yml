name: Rust

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_call:
    inputs:
      release_build:
        required: false
        type: boolean
        default: false
      release_tag:
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always
  BSD_CARGO_CACHE_ROOT: .github/.cache/cargo-home
  BSD_TARGET_CACHE_ROOT: .github/.cache/target
  BSD_ENGINE_TARGET_CACHE_ROOT: .github/.cache/engine-target

permissions:
  contents: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:rncbc/libs-noble
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            jackd2 \
            libjack-jackd2-dev \
            libasound2-dev \
            liblilv-dev \
            libsuil-dev \
            libgtk2.0-dev \
            librubberband-dev \
            rubberband-cli

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  build-ubuntu:
    needs: lint
    runs-on: ubuntu-latest
    env:
      ASSET_BASENAME: maolan-${{ inputs.release_tag }}-linux-x86_64
      CACHE_MODE: ${{ inputs.release_build && 'release' || 'debug' }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Restore Cargo and target caches
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            engine/target
          key: ubuntu-cargo-${{ env.CACHE_MODE }}-${{ hashFiles('Cargo.lock', 'engine/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ubuntu-cargo-${{ env.CACHE_MODE }}-
            ubuntu-cargo-

      - name: Show cache status
        run: echo "cache-hit=${{ steps.cache-restore.outputs.cache-hit }}"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:rncbc/libs-noble
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            jackd2 \
            libjack-jackd2-dev \
            libasound2-dev \
            liblilv-dev \
            libsuil-dev \
            libgtk2.0-dev \
            librubberband-dev \
            rubberband-cli

      - name: Install cargo-llvm-cov
        if: ${{ !inputs.release_build }}
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests and generate coverage
        if: ${{ !inputs.release_build }}
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --lcov --output-path coverage/lcov.info

      - name: Generate HTML coverage report
        if: ${{ !inputs.release_build }}
        run: cargo llvm-cov report --html --output-dir coverage/html

      - name: Publish coverage summary
        if: ${{ !inputs.release_build }}
        run: |
          {
            echo "## Coverage Summary"
            echo
            cargo llvm-cov report --summary-only
          } >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --summary-only

      - name: Upload coverage artifact
        if: ${{ !inputs.release_build }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      - name: Upload HTML coverage artifact
        if: ${{ !inputs.release_build }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/html

      - name: Upload coverage to Codecov
        if: ${{ !inputs.release_build }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build release binary
        if: ${{ inputs.release_build }}
        run: cargo build --release --verbose

      - name: Package Linux binary
        if: ${{ inputs.release_build }}
        run: |
          mkdir -p dist
          mkdir -p "dist/${ASSET_BASENAME}"
          cp target/release/maolan "dist/${ASSET_BASENAME}/maolan"
          cp target/release/maolan-cli "dist/${ASSET_BASENAME}/maolan-cli"
          cp target/release/maolan-osc "dist/${ASSET_BASENAME}/maolan-osc"
          cp images/maolan.svg "dist/${ASSET_BASENAME}/maolan.svg"
          cp desktop/maolan-linux.desktop "dist/${ASSET_BASENAME}/maolan.desktop"
          tar -C dist -czf "dist/${ASSET_BASENAME}.tar.gz" "${ASSET_BASENAME}"

      - name: Save Cargo and target caches
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            engine/target
          key: ubuntu-cargo-${{ env.CACHE_MODE }}-${{ hashFiles('Cargo.lock', 'engine/Cargo.lock', '**/Cargo.toml') }}

      - name: Upload Linux artifact
        if: ${{ inputs.release_build }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: dist/${{ env.ASSET_BASENAME }}.tar.gz

  build-freebsd:
    needs: lint
    runs-on: ubuntu-latest
    env:
      ASSET_BASENAME: maolan-${{ inputs.release_tag }}-freebsd-x86_64
      CACHE_MODE: ${{ inputs.release_build && 'release' || 'debug' }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore FreeBSD VM caches
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.BSD_CARGO_CACHE_ROOT }}
            ${{ env.BSD_TARGET_CACHE_ROOT }}
            ${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}
          key: freebsd-cargo-${{ env.CACHE_MODE }}-${{ hashFiles('Cargo.lock', 'engine/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            freebsd-cargo-${{ env.CACHE_MODE }}-
            freebsd-cargo-

      - name: Show cache status
        run: echo "cache-hit=${{ steps.cache-restore.outputs.cache-hit }}"

      - name: Build and test on FreeBSD
        if: ${{ !inputs.release_build }}
        uses: vmactions/freebsd-vm@v1
        with:
          run: |
            mkdir -p "$HOME/.cargo" target engine/target
            mkdir -p "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"

            cp -R "${{ env.BSD_CARGO_CACHE_ROOT }}/." "$HOME/.cargo/" 2>/dev/null || true
            cp -R "${{ env.BSD_TARGET_CACHE_ROOT }}/." target/ 2>/dev/null || true
            cp -R "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}/." engine/target/ 2>/dev/null || true

            pkg install -y ca_root_nss rust pkgconf libX11 gtk2 lilv suil jackit rubberband
            export SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt

            cargo build
            cargo test
            cargo test -p maolan-engine
            cargo test -p maolan-widgets

            rm -rf "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"
            mkdir -p "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"

            cp -R "$HOME/.cargo/." "${{ env.BSD_CARGO_CACHE_ROOT }}/" 2>/dev/null || true
            cp -R target/. "${{ env.BSD_TARGET_CACHE_ROOT }}/" 2>/dev/null || true
            cp -R engine/target/. "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}/" 2>/dev/null || true

      - name: Build, package, and upload FreeBSD artifact
        if: ${{ inputs.release_build }}
        uses: vmactions/freebsd-vm@v1
        with:
          run: |
            mkdir -p "$HOME/.cargo" target engine/target
            mkdir -p "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"

            cp -R "${{ env.BSD_CARGO_CACHE_ROOT }}/." "$HOME/.cargo/" 2>/dev/null || true
            cp -R "${{ env.BSD_TARGET_CACHE_ROOT }}/." target/ 2>/dev/null || true
            cp -R "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}/." engine/target/ 2>/dev/null || true

            pkg install -y ca_root_nss rust pkgconf libX11 gtk2 lilv suil jackit rubberband
            export SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt

            cargo build --release --verbose

            mkdir -p dist
            mkdir -p "dist/${{ env.ASSET_BASENAME }}"
            cp target/release/maolan "dist/${{ env.ASSET_BASENAME }}/maolan"
            cp target/release/maolan-cli "dist/${{ env.ASSET_BASENAME }}/maolan-cli"
            cp target/release/maolan-osc "dist/${{ env.ASSET_BASENAME }}/maolan-osc"
            cp images/maolan.svg "dist/${{ env.ASSET_BASENAME }}/maolan.svg"
            cp desktop/maolan-bsd.desktop "dist/${{ env.ASSET_BASENAME }}/maolan.desktop"
            tar -C dist -czf "dist/${{ env.ASSET_BASENAME }}.tar.gz" "${{ env.ASSET_BASENAME }}"

            rm -rf "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"
            mkdir -p "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"

            cp -R "$HOME/.cargo/." "${{ env.BSD_CARGO_CACHE_ROOT }}/" 2>/dev/null || true
            cp -R target/. "${{ env.BSD_TARGET_CACHE_ROOT }}/" 2>/dev/null || true
            cp -R engine/target/. "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}/" 2>/dev/null || true

      - name: Save FreeBSD VM caches
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.BSD_CARGO_CACHE_ROOT }}
            ${{ env.BSD_TARGET_CACHE_ROOT }}
            ${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}
          key: freebsd-cargo-${{ env.CACHE_MODE }}-${{ hashFiles('Cargo.lock', 'engine/Cargo.lock', '**/Cargo.toml') }}

      - name: Upload FreeBSD artifact
        if: ${{ inputs.release_build }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: dist/${{ env.ASSET_BASENAME }}.tar.gz

  build-openbsd:
    needs: lint
    runs-on: ubuntu-latest
    env:
      ASSET_BASENAME: maolan-${{ inputs.release_tag }}-openbsd-x86_64
      CACHE_MODE: ${{ inputs.release_build && 'release' || 'debug' }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore OpenBSD VM caches
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.BSD_CARGO_CACHE_ROOT }}
            ${{ env.BSD_TARGET_CACHE_ROOT }}
            ${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}
          key: openbsd-cargo-${{ env.CACHE_MODE }}-${{ hashFiles('Cargo.lock', 'engine/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            openbsd-cargo-${{ env.CACHE_MODE }}-
            openbsd-cargo-

      - name: Show cache status
        run: echo "cache-hit=${{ steps.cache-restore.outputs.cache-hit }}"

      - name: Build and test on OpenBSD 7.8
        if: ${{ !inputs.release_build }}
        uses: vmactions/openbsd-vm@v1
        with:
          run: |
            mkdir -p "$HOME/.cargo" target engine/target
            mkdir -p "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"

            cp -R "${{ env.BSD_CARGO_CACHE_ROOT }}/." "$HOME/.cargo/" 2>/dev/null || true
            cp -R "${{ env.BSD_TARGET_CACHE_ROOT }}/." target/ 2>/dev/null || true
            cp -R "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}/." engine/target/ 2>/dev/null || true

            pkg_add bash pkgconf gtk+2 lilv suil jack rubberband rust
            export PATH="/usr/local/bin:$PATH"

            cargo build
            cargo test
            cargo test -p maolan-engine
            cargo test -p maolan-widgets

            rm -rf "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"
            mkdir -p "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"

            cp -R "$HOME/.cargo/." "${{ env.BSD_CARGO_CACHE_ROOT }}/" 2>/dev/null || true
            cp -R target/. "${{ env.BSD_TARGET_CACHE_ROOT }}/" 2>/dev/null || true
            cp -R engine/target/. "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}/" 2>/dev/null || true

      - name: Build, package, and upload OpenBSD artifact
        if: ${{ inputs.release_build }}
        uses: vmactions/openbsd-vm@v1
        with:
          run: |
            mkdir -p "$HOME/.cargo" target engine/target
            mkdir -p "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"

            cp -R "${{ env.BSD_CARGO_CACHE_ROOT }}/." "$HOME/.cargo/" 2>/dev/null || true
            cp -R "${{ env.BSD_TARGET_CACHE_ROOT }}/." target/ 2>/dev/null || true
            cp -R "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}/." engine/target/ 2>/dev/null || true

            pkg_add bash pkgconf gtk+2 lilv suil jack rubberband rust
            export PATH="/usr/local/bin:$PATH"

            cargo build --release --verbose

            mkdir -p dist
            mkdir -p "dist/${{ env.ASSET_BASENAME }}"
            cp target/release/maolan "dist/${{ env.ASSET_BASENAME }}/maolan"
            cp target/release/maolan-cli "dist/${{ env.ASSET_BASENAME }}/maolan-cli"
            cp target/release/maolan-osc "dist/${{ env.ASSET_BASENAME }}/maolan-osc"
            cp images/maolan.svg "dist/${{ env.ASSET_BASENAME }}/maolan.svg"
            cp desktop/maolan-bsd.desktop "dist/${{ env.ASSET_BASENAME }}/maolan.desktop"
            tar -C dist -czf "dist/${{ env.ASSET_BASENAME }}.tar.gz" "${{ env.ASSET_BASENAME }}"

            rm -rf "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"
            mkdir -p "${{ env.BSD_CARGO_CACHE_ROOT }}" "${{ env.BSD_TARGET_CACHE_ROOT }}" "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}"

            cp -R "$HOME/.cargo/." "${{ env.BSD_CARGO_CACHE_ROOT }}/" 2>/dev/null || true
            cp -R target/. "${{ env.BSD_TARGET_CACHE_ROOT }}/" 2>/dev/null || true
            cp -R engine/target/. "${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}/" 2>/dev/null || true

      - name: Save OpenBSD VM caches
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.BSD_CARGO_CACHE_ROOT }}
            ${{ env.BSD_TARGET_CACHE_ROOT }}
            ${{ env.BSD_ENGINE_TARGET_CACHE_ROOT }}
          key: openbsd-cargo-${{ env.CACHE_MODE }}-${{ hashFiles('Cargo.lock', 'engine/Cargo.lock', '**/Cargo.toml') }}

      - name: Upload OpenBSD artifact
        if: ${{ inputs.release_build }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: dist/${{ env.ASSET_BASENAME }}.tar.gz

  publish-release-assets:
    if: ${{ inputs.release_build }}
    runs-on: ubuntu-latest
    needs:
      - build-ubuntu
      - build-freebsd
      - build-openbsd
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mapfile -t artifacts < <(find dist -maxdepth 1 -type f -name '*.tar.gz' | sort)

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found in dist/"
            find dist -maxdepth 3 -print
            exit 1
          fi

          gh release upload "$TAG_NAME" "${artifacts[@]}" --clobber --repo "$REPOSITORY"
