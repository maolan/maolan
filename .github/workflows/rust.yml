name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_call:
    inputs:
      release_build:
        required: false
        type: boolean
        default: false
      release_tag:
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always
  FREEBSD_VERSION: '14.3'

permissions:
  contents: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:rncbc/libs-noble
        sudo apt-get update
        sudo apt-get install -y pkg-config jackd2 libjack-jackd2-dev libasound2-dev liblilv-dev libsuil-dev libgtk2.0-dev librubberband-dev rubberband-cli
    - name: Check formatting
      run: cargo fmt --check
    - name: Run Clippy
      run: cargo clippy --all-targets -- -D warnings

  build-ubuntu:
    needs: lint
    runs-on: ubuntu-latest
    env:
      ASSET_BASENAME: maolan-${{ inputs.release_tag }}-linux-x86_64

    steps:
    - uses: actions/checkout@v5
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:rncbc/libs-noble
        sudo apt-get update
        sudo apt-get install -y pkg-config jackd2 libjack-jackd2-dev libasound2-dev liblilv-dev libsuil-dev libgtk2.0-dev librubberband-dev rubberband-cli
    - name: Build
      if: ${{ !inputs.release_build }}
      run: cargo build
    - name: Run tests
      if: ${{ !inputs.release_build }}
      run: cargo test
    - name: Install cargo-llvm-cov
      if: ${{ !inputs.release_build }}
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Generate coverage report
      if: ${{ !inputs.release_build }}
      run: |
        mkdir -p coverage
        cargo llvm-cov --workspace --lcov --output-path coverage/lcov.info
    - name: Generate HTML coverage report
      if: ${{ !inputs.release_build }}
      run: cargo llvm-cov report --html --output-dir coverage/html
    - name: Publish coverage summary
      if: ${{ !inputs.release_build }}
      run: |
        {
          echo "## Coverage Summary"
          echo
          cargo llvm-cov report --summary-only
        } >> "$GITHUB_STEP_SUMMARY"
        cargo llvm-cov report --summary-only
    - name: Upload coverage artifact
      if: ${{ !inputs.release_build }}
      uses: actions/upload-artifact@v6
      with:
        name: coverage-lcov
        path: coverage/lcov.info
    - name: Upload HTML coverage artifact
      if: ${{ !inputs.release_build }}
      uses: actions/upload-artifact@v6
      with:
        name: coverage-html
        path: coverage/html
    - name: Upload coverage to Codecov
      if: ${{ !inputs.release_build }}
      uses: codecov/codecov-action@v5
      with:
        files: coverage/lcov.info
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
    - name: Build release binary
      if: ${{ inputs.release_build }}
      run: cargo build --release --verbose
    - name: Package Linux binary
      if: ${{ inputs.release_build }}
      run: |
        mkdir -p dist
        mkdir -p "dist/${ASSET_BASENAME}"
        cp target/release/maolan "dist/${ASSET_BASENAME}/maolan"
        cp target/release/maolan-cli "dist/${ASSET_BASENAME}/maolan-cli"
        tar -C dist -czf "dist/${ASSET_BASENAME}.tar.gz" "${ASSET_BASENAME}"
    - name: Upload Linux artifact
      if: ${{ inputs.release_build }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.ASSET_BASENAME }}
        path: dist/${{ env.ASSET_BASENAME }}.tar.gz

  build-freebsd:
    needs: lint
    runs-on: ubuntu-latest
    env:
      ASSET_BASENAME: maolan-${{ inputs.release_tag }}-freebsd-x86_64

    steps:
    - uses: actions/checkout@v5
    - name: Build and test on FreeBSD
      if: ${{ !inputs.release_build }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: freebsd
        version: ${{ env.FREEBSD_VERSION }}
        run: |
          sudo mkdir -p /usr/local/etc/pkg/repos
          echo 'FreeBSD: { url: "pkg+http://pkg.FreeBSD.org/${ABI}/latest", mirror_type: "srv", enabled: yes }' | sudo tee /usr/local/etc/pkg/repos/FreeBSD.conf
          sudo pkg update -f
          sudo pkg install -y ca_root_nss rustup-init pkgconf libX11 gtk2 lilv suil jackit rubberband
          export SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt

          rustup-init -y --default-toolchain stable
          . "$HOME/.cargo/env"

          cargo build
          cargo test
    - name: Build, package, and upload FreeBSD artifact
      if: ${{ inputs.release_build }}
      uses: cross-platform-actions/action@v0.30.0
      with:
        operating_system: freebsd
        version: ${{ env.FREEBSD_VERSION }}
        run: |
          sudo mkdir -p /usr/local/etc/pkg/repos
          echo 'FreeBSD: { url: "pkg+http://pkg.FreeBSD.org/${ABI}/latest", mirror_type: "srv", enabled: yes }' | sudo tee /usr/local/etc/pkg/repos/FreeBSD.conf
          sudo pkg update -f
          sudo pkg install -y ca_root_nss rustup-init pkgconf libX11 gtk2 lilv suil jackit rubberband
          export SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt

          rustup-init -y --default-toolchain stable
          . "$HOME/.cargo/env"

          cargo build --release --verbose

          mkdir -p dist
          mkdir -p "dist/${{ env.ASSET_BASENAME }}"
          cp target/release/maolan "dist/${{ env.ASSET_BASENAME }}/maolan"
          cp target/release/maolan-cli "dist/${{ env.ASSET_BASENAME }}/maolan-cli"
          tar -C dist -czf "dist/${{ env.ASSET_BASENAME }}.tar.gz" "${{ env.ASSET_BASENAME }}"
    - name: Upload FreeBSD artifact
      if: ${{ inputs.release_build }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.ASSET_BASENAME }}
        path: dist/${{ env.ASSET_BASENAME }}.tar.gz

  publish-release-assets:
    if: ${{ inputs.release_build }}
    runs-on: ubuntu-latest
    needs:
    - build-ubuntu
    - build-freebsd

    steps:
    - name: Download release artifacts
      uses: actions/download-artifact@v5
      with:
        merge-multiple: true
        path: dist
    - name: Publish assets to release
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ inputs.release_tag }}
        REPOSITORY: ${{ github.repository }}
      run: |
        mapfile -t artifacts < <(find dist -maxdepth 1 -type f -name '*.tar.gz' | sort)
        if [ "${#artifacts[@]}" -eq 0 ]; then
          echo "No release artifacts found in dist/"
          find dist -maxdepth 3 -print
          exit 1
        fi
        gh release upload "$TAG_NAME" "${artifacts[@]}" --clobber --repo "$REPOSITORY"
