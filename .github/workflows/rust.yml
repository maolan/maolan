name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:
    inputs:
      release_build:
        required: false
        type: boolean
        default: false
      release_tag:
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write

jobs:
  lint-and-test:
    if: ${{ !inputs.release_build }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/rust.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:rncbc/libs-noble
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            jackd2 \
            libjack-jackd2-dev \
            libasound2-dev \
            liblilv-dev \
            libsuil-dev \
            libgtk2.0-dev \
            librubberband-dev \
            rubberband-cli \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            llvm-dev \
            libclang-dev

      - name: Clean apt cache metadata
        run: |
          sudo rm -f /var/cache/apt/archives/lock
          sudo rm -rf /var/cache/apt/archives/partial

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

  build-release:
    if: ${{ inputs.release_build }}
    runs-on: ubuntu-latest
    env:
      ASSET_BASENAME: maolan-${{ inputs.release_tag }}-linux-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/rust.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:rncbc/libs-noble
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            jackd2 \
            libjack-jackd2-dev \
            libasound2-dev \
            liblilv-dev \
            libsuil-dev \
            libgtk2.0-dev \
            librubberband-dev \
            rubberband-cli \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            llvm-dev \
            libclang-dev

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release

      - name: Package Linux binary
        run: |
          mkdir -p dist
          mkdir -p "dist/${ASSET_BASENAME}"
          cp target/release/maolan "dist/${ASSET_BASENAME}/maolan"
          cp target/release/maolan-cli "dist/${ASSET_BASENAME}/maolan-cli"
          cp target/release/maolan-osc "dist/${ASSET_BASENAME}/maolan-osc"
          cp images/maolan.svg "dist/${ASSET_BASENAME}/maolan.svg"
          cp desktop/maolan-linux.desktop "dist/${ASSET_BASENAME}/maolan.desktop"
          tar -C dist -czf "dist/${ASSET_BASENAME}.tar.gz" "${ASSET_BASENAME}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: dist/${{ env.ASSET_BASENAME }}.tar.gz

  publish-release-assets:
    if: ${{ inputs.release_build }}
    runs-on: ubuntu-latest
    needs:
      - build-release
    steps:
      - uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mapfile -t artifacts < <(find dist -maxdepth 1 -type f -name '*.tar.gz' | sort)

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found in dist/"
            find dist -maxdepth 3 -print
            exit 1
          fi

          gh release upload "$TAG_NAME" "${artifacts[@]}" --clobber --repo "$REPOSITORY"
