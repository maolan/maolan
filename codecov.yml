codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: nearest
  range: "0...100"
  status:
    project:
      default:
        target: auto
        threshold: 0.25%
    patch:
      default:
        target: auto
        threshold: 0.25%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

