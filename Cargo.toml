[package]
name = "maolan"
default-run = "maolan"
version = "0.0.6"
edition = "2024"
description = "Rust DAW application for recording, editing, routing, automation, export, and plugin hosting"
license = "BSD-2-Clause"
readme = "README.md"
repository = "https://github.com/maolan/maolan"
homepage = "https://github.com/maolan/maolan"
keywords = ["audio", "midi", "daw", "vst3", "lv2"]
categories = ["multimedia::audio"]

[workspace]
members = [
  "generate",
  "engine",
  "widgets"
]

[features]
default = []
cuda = ["maolan-generate/cuda"]

[dependencies]
crossterm = "0.29.0"
ebur128 = "0.1"
flacenc = "0.5"
hf-hub = { version = "0.5.0", default-features = false, features = ["tokio", "rustls-tls"] }
i24 = "1.0.1"
iced = { version = "0.14.0", features = ["advanced", "image", "lazy", "tokio"] }
iced_aw = "0.13.1"
iced_drop = { version = "0.2.16", features = ["helpers"] }
iced_fonts = { version = "0.3.0", features = ["lucide"] }
libloading = "0.8.9"
maolan-generate = { version = "0.0.1", path = "./generate" }
maolan-engine = { version = "0.0.4", path = "./engine" }
maolan-widgets = { version = "0.0.1", path = "./widgets" }
midly = "0.5.3"
mp3lame-encoder = "0.2"
pitch-detection = "0.3.0"
ratatui = "0.30.0"
rfd = "0.17.2"
rubato = "0.16.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
symphonia = { version = "0.5.5", default-features = false, features = ["all-formats", "all-codecs"] }
tokio = { version = "1.50.0", features = ["full"] }
toml = "0.8.23"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
vorbis_rs = "0.5"
vst3 = "0.3"
wavers = "1.5.1"

[target.'cfg(target_os = "linux")'.dependencies]
alsa = "0.9.1"

[target.'cfg(target_os = "freebsd")'.dependencies]
nix = { version = "0.31.2", features = ["ioctl"] }
nvtree = "0.0.2"

[target.'cfg(all(unix, not(target_os = "macos")))'.dependencies]
lilv = "0.2.4"
x11-dl = "2.21.0"
